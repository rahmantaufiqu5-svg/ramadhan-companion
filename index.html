<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadhan Companion</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
</head>
<body>

<div class="app-container">

  <!-- TOP BAR -->
  <header class="topbar">
    <div>
      <h1>Ramadhan Companion</h1>
      <p id="greetingText" class="greeting"></p>
      <p id="todayDate"></p>
    </div>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </header>

  <main class="dashboard">

    <!-- NEXT PRAYER -->
    <section class="card highlight">
      <h2>🕌 Waktu Sholat Berikutnya</h2>
      <p id="nextPrayer">Memuat...</p>
      <p id="countdown">00:00:00</p>
    </section>

    <!-- CHECKLIST -->
    <section class="card">
      <h2>✅ Checklist Amal</h2>
      <div id="checklist"></div>
      <div class="progress-wrapper">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <p id="progressText"></p>
      </div>
    </section>

    <!-- TILAWAH -->
    <section class="card">
      <h2>📖 Target Tilawah</h2>
      <p>Target: 1 Juz / Hari</p>
      <p>Progress: <span id="tilawahValue">0</span> Juz</p>
      <div class="tilawah-buttons">
        <button onclick="addTilawah(0.5)">+0.5</button>
        <button onclick="addTilawah(1)">+1</button>
        <button onclick="addTilawah(-0.5)">-0.5</button>
      </div>
    </section>

    <!-- MUHASABAH -->
    <section class="card">
      <h2>📝 Muhasabah Harian</h2>
      <textarea id="muhasabah" placeholder="Tulis refleksi hari ini..."></textarea>
      <button id="saveMuhasabah">Simpan</button>
    </section>

    <!-- STATISTIK -->
    <section class="card">
      <h2>📊 Statistik Hari Ini</h2>
      <p id="statsText">Belum ada data</p>
    </section>

  </main>

</div>

<script src="js/main.js"></script>
<script src="js/checklist.js"></script>
<script src="js/tilawah.js"></script>
<script src="js/theme.js"></script>
<script src="js/prayer.js"></script>
<script src="js/muhasabah.js"></script>
<script src="js/stats.js"></script>
<script src="sw.js"></script>

</body>
</html>
