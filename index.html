<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramadhan Companion</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  
  <!-- Google Font Modern -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<div class="app-container">

  <!-- TOP BAR -->
  <header class="topbar">
    <div>
      <h1>Ramadhan Companion</h1>
      <p id="greetingText" class="greeting"></p>
    </div>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </header>

  <!-- MAIN DASHBOARD -->
  <main class="dashboard">

    <!-- NEXT PRAYER HIGHLIGHT -->
    <section class="card highlight">
      <h2>🕌 Waktu Sholat Berikutnya</h2>
      <p id="nextPrayer" class="next-prayer">Memuat...</p>
      <p id="countdown" class="countdown"></p>
    </section>

    <!-- DATE -->
    <section class="card">
      <h2>📅 Hari Ini</h2>
      <p id="todayDate"></p>
      <p id="todayHijri"></p>
      <p id="dayRamadhan"></p>
    </section>

    <!-- PRAYER TIMES -->
    <section class="card">
      <h2>🕌 Jadwal Sholat</h2>
      <div id="prayerTimes">Memuat...</div>
    </section>

    <!-- CHECKLIST -->
    <section class="card">
      <h2>✅ Checklist Amal</h2>
      <div id="checklist"></div>

      <div class="progress-wrapper">
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
        <p id="progressText"></p>
      </div>
      <button id="addTaskBtn">Tambah Task</button>
    </section>

    <!-- TILAWAH -->
    <section class="card">
      <h2>📖 Target Tilawah</h2>
      <p>Target: 1 Juz / Hari</p>
      <p>Progress: <span id="tilawahValue">0</span> Juz</p>
      <div class="tilawah-buttons">
        <button onclick="addTilawah(0.25)">+0.25</button>
        <button onclick="addTilawah(0.5)">+0.5</button>
        <button onclick="addTilawah(1)">+1</button>
        <button onclick="addTilawah(-0.25)">-0.25</button>
        <button onclick="addTilawah(-0.5)">-0.5</button>
      </div>
    </section>

    <!-- MUHASABAH -->
    <section class="card">
      <h2>📝 Muhasabah Harian</h2>
      <textarea id="muhasabahInput" placeholder="Tulis refleksi hari ini..."></textarea>
      <button id="saveMuhasabah">Simpan</button>
      <div id="muhasabahHistory"></div>
    </section>

    <!-- STATISTIK -->
    <section class="card">
      <h2>📊 Statistik Ibadah</h2>
      <canvas id="statsChart"></canvas>
    </section>

  </main>
</div>

<!-- Scripts -->
<script src="js/main.js"></script>
<script src="js/checklist.js"></script>
<script src="js/tilawah.js"></script>
<script src="js/muhasabah.js"></script>
<script src="js/stats.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
